name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Note: ANDROID_DEBUG_KEYSTORE_BASE64 is inlined below intentionally.
# Debug keystores are NOT security-sensitive (they can be extracted from any
# debug APK). The corresponding SHA-1/SHA-256 are registered in Firebase
# Console for OAuth on this Android app. Replace with a real release keystore
# (stored as a GitHub Secret) before publishing the app.

env:
  ANDROID_DEBUG_KEYSTORE_BASE64: 

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore stable debug keystore
        run: |
          mkdir -p ~/.android
          echo "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          BYTES=$(wc -c < ~/.android/debug.keystore)
          echo "Restored stable debug.keystore ($BYTES bytes; expected 2666)"
          if [ "$BYTES" -ne 2666 ]; then
            echo "::error::Keystore size mismatch! Got $BYTES bytes, expected 2666." >&2
            exit 1
          fi
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android | grep -E "SHA1|SHA256"

      - name: Install npm dependencies
        run: npm install --no-audit

      - name: Inject API keys into env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env.local
          echo "VITE_YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env.local

      - name: Restore google-services.json from secret
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
            echo "google-services.json restored ($(wc -c < android/app/google-services.json) bytes)"
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 secret not set; Firebase Android Auth will not work"
          fi

      - name: Build web assets (Vite)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install Gradle 8.14.3 (direct download to bypass wrapper validation)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.14.3-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.14.3/bin" >> $GITHUB_PATH

      - name: Regenerate gradle wrapper (fixes corrupted wrapper jar in repo)
        working-directory: android
        run: gradle wrapper --gradle-version 8.14.3 --distribution-type all

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"
          ls -la "$APK_PATH"

      - name: Verify APK signing certificate
        run: |
          unzip -p "${{ steps.find_apk.outputs.apk_path }}" META-INF/ANDROIDD.RSA META-INF/CERT.RSA META-INF/*.RSA 2>/dev/null \
            | keytool -printcert | grep -E "SHA1|SHA256" || echo "(could not extract APK cert)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: toeic-app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "APK: \`${{ steps.find_apk.outputs.apk_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY
